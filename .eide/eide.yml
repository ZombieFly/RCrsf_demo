version: "4.1"
name: RCrsf_demo
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Core
  - Drivers
  - Libs
  - FATFS
  - Middlewares
  - USB_DEVICE
virtualFolder:
  name: <virtual_root>
  files:
    - path: startup_stm32h723xx.s
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: dc2111f3630333e87beb03c7fcde58a6
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32H723xx
        - USE_PWR_LDO_SUPPLY
      incList:
        - Core/Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
        - Drivers/CMSIS/Device/ST/STM32H7xx/Include
        - Drivers/CMSIS/Include
        - Libs/rcrsf
        - Libs/W25Q64
        - FATFS/Target
        - FATFS/App
        - Middlewares/Third_Party/FatFs/src
        - USB_DEVICE/App
        - USB_DEVICE/Target
        - Middlewares/ST/STM32_USB_Device_Library/Core/Inc
        - Middlewares/ST/STM32_USB_Device_Library/Class/MSC/Inc
      libList: []
    excludeList: []
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M7
        floatingPointHardware: double
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c99
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32H723XG_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32H723VG
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 50000
    uploader: JLink
